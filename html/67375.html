<!-- Parkview in the Round Small (67375) -->
<style>
.stage-image {
	position: relative;
	z-index: 0;
	display: flex;
	justify-content: center;
	align-items: center;
	text-align: center;
	background-color: white;
	color: black;
	border: 2px solid black;
	width: 400px;
	height: 200px;
	font-size: 50px;
}
</style>

<table
	width="100%"
	border="0"
	cellspacing="0"
	cellpadding="0"
	align="center"
>
	<tr>
		<td>
			<div
				align="center"
				style="position: relative; z-index: 0"
			>
				<img
					src="https://s3.amazonaws.com/prdv2-dt-client/seating_images/pixel.png"
					width="1"
					height="100"
				>
			</div>
		</td>
	</tr>

	<!-- ALL -->
	<tr>
		<td>
			<div
				align="center"
				style="position: relative"
			>
				<table align="center">
					<!-- TOP -->
					<tr>
						<td>
							<div
								align="center"
								style="position: relative"
							>
								<table align="center">
									<tr>
										<td>
											<div
												align="center"
												style="position: relative; z-index: 2"
											>
												{{{ sectionsMarkup.83301 }}}
											</div>
										</td>
									</tr>
								</table>
							</div>
						</td>
					</tr>
					<!-- CENTER -->
					<tr>
						<td>
							<div
								align="center"
								style="position: relative; top: 100px"
							>
								<table align="center">
									<tr>
										<td>
											<div
												class="adjust rotate90R"
												align="center"
												style="position: relative;z-index: 1;right: 70px;"
											>
												{{{ sectionsMarkup.83302 }}}
											</div>
										</td>
										<td>
											<div
												class="stage-image"
												align="center"
											>
												STAGE
											</div>
										</td>
										<td>
											<div
												class="adjust rotate90L"
												align="center"
												style="position: relative;z-index: 1;left: 70px;"
											>
												{{{ sectionsMarkup.83303 }}}
											</div>
										</td>
									</tr>
								</table>
							</div>
						</td>
					</tr>
					<!-- BOTTOM -->
					<tr>
						<td>
							<div
								align="center"
								style="position: relative; top: 310px"
							>
								<table align="center">
									<tr>
										<td>
											<div
												class="adjust rotate45R"
												align="center"
												style="position: relative;z-index: 2;right: 100px;"
											>
												{{{ sectionsMarkup.83304 }}}
											</div>
										</td>
										<td>
											<div
												class="adjust rotate45L"
												align="center"
												style="position: relative;z-index: 2;left: 100px;"
											>
												{{{ sectionsMarkup.83305 }}}
											</div>
										</td>
									</tr>
								</table>
							</div>
						</td>
					</tr>
				</table>
			</div>
		</td>
	</tr>
</table>
