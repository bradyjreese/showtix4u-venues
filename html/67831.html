<!-- Ocean City Music Pier (67831) -->
<style>
  .stage-image {
    position: relative;
    z-index: 0;
    background-color: white;
    color: black;
    font-size: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border: 2px solid black;
    width: 1500px;
    height: 150px;
  }

  .runway-image {
    position: relative;
    z-index: 0;
    background-color: white;
    color: black;
    font-size: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    writing-mode: vertical-rl;
    text-orientation: upright;
    border: 2px solid black;
    width: 150px;
    height: 520px;
  }

  .judges-image {
    position: relative;
    z-index: 0;
    background-color: white;
    color: black;
    font-size: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border: 2px solid black;
    width: 500px;
    height: 100px;
    bottom: 150px;
    left: 85px;
  }

  .manual-margin {
    position: relative;
    z-index: 0;
    margin: auto;
    margin-top: 10px;
  }

  .offset-rows > div > table:nth-child(even) {
    position: relative;
    left: 20px;
  }

  .offset-rows-front-right > div > table:nth-child(2n + 6) {
    position: relative;
    right: 20px;
  }

  .hide-rows-left > div > table:nth-child(5),
  .hide-rows-right > div > table:nth-child(1),
  .hide-rows-right > div > table:nth-child(2),
  .hide-rows-right > div > table:nth-child(5) {
    visibility: hidden;
  }
</style>
<table width="100%" border="0" cellspacing="0" cellpadding="0" align="center">
  <!-- Stage Image -->
  <tr>
    <td>
      <div align="center" style="position: relative; z-index: 0">
        <table align="center" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td>
              <div class="stage-image" align="center">STAGE</div>
            </td>
          </tr>
        </table>
      </div>
    </td>
  </tr>
  <!-- ALL -->
  <tr>
    <td>
      <div align="center" style="position: relative">
        <table align="center">
          <!-- Front Names -->
          <tr>
            <td>
              <div class="front-indicator manual-margin" align="center" style="top: 285px; left: 465px">AUDITORIUM</div>
            </td>
            <td>
              <div class="runway-image" align="center">RUNWAY</div>
            </td>
            <td>
              <div class="judges-image" align="center">JUDGES</div>
            </td>
          </tr>
          <!-- Front Seats -->
          <tr style="position: relative; bottom: 170px">
            <td>
              <div class="hide-rows-left offset-rows" align="left" style="position: relative; z-index: 1">
                {{{ sectionsMarkup.83602 }}}
              </div>
            </td>
            <td>
              <div align="center" style="position: relative; z-index: 0">
                <img src="https://s3.amazonaws.com/prdv2-dt-client/seating_images/pixel.png" width="100" height="1" />
              </div>
            </td>
            <td valign="bottom">
              <div class="hide-rows-right offset-rows-front-right" align="right" style="position: relative; z-index: 1">
                {{{ sectionsMarkup.83603 }}}
              </div>
            </td>
          </tr>
          <!-- Middle Names -->
          <tr>
            <td colspan="3">
              <div class="front-indicator manual-margin" align="center" style="bottom: 135px">AUDITORIUM CENTER</div>
            </td>
          </tr>
          <!-- Middle Seats -->
          <tr>
            <td colspan="3">
              <div align="left" style="position: relative; z-index: 1; bottom: 115px; left: 205px">
                {{{ sectionsMarkup.83604 }}}
              </div>
            </td>
          </tr>
          <!-- Back Names -->
          <tr>
            <td colspan="3">
              <div class="front-indicator manual-margin" align="center" style="bottom: 75px">SOLARIUM</div>
            </td>
          </tr>
          <!-- Back Seats -->
          <tr style="position: relative; bottom: 50px">
            <td>
              <div class="offset-rows" align="left" style="position: relative; z-index: 1">
                {{{ sectionsMarkup.83605 }}}
              </div>
            </td>
            <td>
              <div align="center" style="position: relative; z-index: 0">
                <img src="https://s3.amazonaws.com/prdv2-dt-client/seating_images/pixel.png" width="100" height="1" />
              </div>
            </td>
            <td>
              <div class="offset-rows" align="left" style="position: relative; z-index: 1">
                {{{ sectionsMarkup.83606 }}}
              </div>
            </td>
          </tr>
        </table>
      </div>
    </td>
  </tr>
</table>
