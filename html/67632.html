<!-- Olathe North Auditorium (67632) -->
<style>
    .row-blue td:has(.seatCharts-seat) {
        background-color: cornflowerblue;
    }

    .row-red td:has(.seatCharts-seat) {
        background-color: red;
    }
</style>
<table width="100%" border="0" cellspacing="0" cellpadding="0" align="center">
  <!-- Stage Image -->
  <tr>
    <td>
      <div align="center" style="position: relative; z-index: 0">
        <img src="https://s3.amazonaws.com/prdv2-dt-client/seating_images/stage.png" alt="STAGE" width="300" height="80" />
      </div>
    </td>
  </tr>
  <tr>
    <td>
      <div align="center" style="position: relative; z-index: 0">
        <img src="https://s3.amazonaws.com/prdv2-dt-client/seating_images/pixel.png" width="1" height="25" />
      </div>
    </td>
  </tr>
  <!-- ALL -->
  <tr>
    <td>
      <div align="center" style="position: relative">
        <table align="center">
          <!-- Names -->
          <tr>
            <td>
              <div align="right" style="position: relative; z-index: 0">{{{ sectionNames.83404 }}}</div>
            </td>
            <td rowspan="2">
              <div align="center" style="position: relative; z-index: 0">
                <img src="https://s3.amazonaws.com/prdv2-dt-client/seating_images/pixel.png" width="50" height="1" />
              </div>
            </td>
            <td>
              <div align="center" style="position: relative; z-index: 0">{{{ sectionNames.83406 }}}</div>
            </td>
            <td rowspan="2">
              <div align="center" style="position: relative; z-index: 0">
                <img src="https://s3.amazonaws.com/prdv2-dt-client/seating_images/pixel.png" width="50" height="1" />
              </div>
            </td>
            <td>
              <div align="left" style="position: relative; z-index: 0">{{{ sectionNames.83408 }}}</div>
            </td>
          </tr>
          <!-- Seats -->
          <tr>
            <!-- Left -->
            <td valign="top">
              <div align="right" style="position: relative">
                <table align="right" border="0" cellspacing="0" cellpadding="0">
                  <tr>
                    <td>
                      <div class="row-blue" align="right" style="position: relative; z-index: 1">{{{ sectionsMarkup.83404 }}}</div>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <div class="row-red" align="right" style="position: relative; z-index: 1">{{{ sectionsMarkup.83405 }}}</div>

                  </tr>
                </table>
              </div>
            </td>
            <!-- Center -->
            <td>
              <div align="center" style="position: relative">
                <table align="center" border="0" cellspacing="0" cellpadding="0">
                  <tr>
                    <td>
                      <div class="row-blue" align="center" style="position: relative; z-index: 1">{{{ sectionsMarkup.83406 }}}</div>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <div class="row-red" align="center" style="position: relative; z-index: 1">{{{ sectionsMarkup.83407 }}}</div>
                    </td>
                  </tr>
                </table>
              </div>
            </td>
            <!-- Right -->
            <td valign="top">
              <div align="left" style="position: relative">
                <table align="left" border="0" cellspacing="0" cellpadding="0">
                  <tr>
                    <td>
                      <div class="row-blue" align="left" style="position: relative; z-index: 1">{{{ sectionsMarkup.83408 }}}</div>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <div class="row-red" align="left" style="position: relative; z-index: 1">{{{ sectionsMarkup.83409 }}}</div>
                    </td>
                  </tr>
                </table>
              </div>
            </td>
          </tr>
        </table>
      </div>
    </td>
  </tr>
</table>
